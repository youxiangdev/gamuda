services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamuda-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      JINA_API_KEY: ${JINA_API_KEY}
      JINA_EMBEDDING_MODEL: ${JINA_EMBEDDING_MODEL}
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      - ./storage:/app/storage
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/app"
      ]

volumes:
  pgdata:
